name: Update wire feed
on:
  schedule:
    - cron: '15 5,17 * * *' # twice daily, 05:15 and 17:15 UTC
  workflow_dispatch:
permissions:
  contents: write
  actions: write
concurrency:
  group: update-news
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch latest headlines
        run: node scripts/fetch-news.mjs
      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/news.json; then
            echo "No new headlines; skipping commit."
            exit 0
          fi
          git config user.name "wire-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          git commit -m "chore: refresh wire feed ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
          # Pushes made with GITHUB_TOKEN don't trigger other workflows;
          # dispatch the Pages deploy explicitly.
          gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
